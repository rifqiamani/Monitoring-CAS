<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Monitoring CAS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Inter',sans-serif;background:#f0f2f5;color:#1a1a2e}

/* ── HEADER ── */
header{
  background:#fff;
  padding:0 20px;
  height:56px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid #e8eaed;
  position:sticky;top:0;z-index:100;
}
.header-left{display:flex;align-items:center;gap:10px;}
.back-btn{
  width:32px;height:32px;display:grid;place-items:center;
  color:#555;cursor:pointer;border-radius:8px;
  font-size:18px;text-decoration:none;
}
.back-btn:hover{background:#f0f2f5;}
header h1{font-size:17px;font-weight:600;color:#111;}
.status-dot{
  width:8px;height:8px;border-radius:50%;
  background:#ccc;margin-left:4px;
  transition:background .3s;
}
.status-dot.online{background:#4caf50;}
.status-dot.connecting{background:#ff9800;animation:blink .8s step-end infinite;}
@keyframes blink{50%{opacity:0}}
.header-right{display:flex;align-items:center;gap:6px;}
.icon-btn{
  width:36px;height:36px;display:grid;place-items:center;
  border-radius:8px;cursor:pointer;color:#555;font-size:18px;
}
.icon-btn:hover{background:#f0f2f5;}
.conn-label{font-size:12px;color:#888;font-weight:500;}

/* ── MAIN ── */
main{padding:16px;max-width:900px;margin:0 auto;}

/* ── MQTT CONFIG ── */
.config-card{
  background:#fff;border-radius:16px;padding:16px 18px;
  margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);
}
.config-card summary{
  font-size:13px;font-weight:600;color:#555;cursor:pointer;
  list-style:none;display:flex;align-items:center;gap:6px;
}
.config-card summary::before{content:'⚙';font-size:15px;}
.config-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;margin-top:14px;
}
.cfg-group label{display:block;font-size:11px;color:#888;font-weight:600;margin-bottom:4px;letter-spacing:.5px;}
.cfg-group input{
  width:100%;border:1.5px solid #e8eaed;border-radius:8px;
  padding:7px 10px;font-size:13px;font-family:'Inter',sans-serif;
  outline:none;transition:.2s;color:#111;background:#fafafa;
}
.cfg-group input:focus{border-color:#2979ff;background:#fff;}
.cfg-actions{display:flex;gap:8px;margin-top:14px;}
.btn{
  padding:8px 20px;border-radius:8px;border:none;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
  transition:.15s;
}
.btn-primary{background:#2979ff;color:#fff;}
.btn-primary:hover{background:#1565c0;}
.btn-danger{background:#fff;border:1.5px solid #ef5350;color:#ef5350;}
.btn-danger:hover{background:#fef2f2;}

/* ── GAUGE GRID ── */
.gauges{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:12px;margin-bottom:12px;
}
@media(min-width:600px){.gauges{grid-template-columns:repeat(4,1fr);}}

.gauge-card{
  background:#fff;border-radius:16px;
  padding:18px 12px 14px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.gauge-title{font-size:12px;color:#888;font-weight:500;letter-spacing:.3px;}
.gauge-wrap{position:relative;width:130px;height:80px;}
.gauge-wrap svg{width:100%;height:100%;}
.gauge-center{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;line-height:1;
}
.gauge-val{font-size:26px;font-weight:700;color:#2979ff;}
.gauge-unit{font-size:11px;color:#aaa;font-weight:500;margin-top:2px;}
.arc-bg{fill:none;stroke:#e8eaed;stroke-width:9;stroke-linecap:round;}
.arc-fg{fill:none;stroke:#2979ff;stroke-width:9;stroke-linecap:round;
  transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1);}
.gauge-range{
  display:flex;justify-content:space-between;width:130px;
  font-size:10px;color:#bbb;font-weight:500;
}
.gauge-status-pill{
  font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;
  background:#e8f5e9;color:#388e3c;letter-spacing:.3px;
  transition:all .3s;
}
.pill-warn{background:#fff8e1;color:#f57c00;}
.pill-danger{background:#fce4ec;color:#c62828;}

/* ── CHART CARDS ── */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:600px){.charts{grid-template-columns:1fr;}}

.chart-card{
  background:#fff;border-radius:16px;
  padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.08);
}
.chart-card-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:4px;
}
.chart-card-header h3{font-size:13px;font-weight:700;color:#111;}
.chart-legend{display:flex;gap:10px;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#888;}
.legend-dot{width:8px;height:8px;border-radius:50%;}
.chart-wrap{position:relative;height:130px;margin-top:10px;}

/* ── LOG ── */
.log-card{
  background:#fff;border-radius:16px;
  padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.08);
}
.log-card h3{font-size:13px;font-weight:700;color:#111;margin-bottom:12px;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{
  text-align:left;padding:6px 10px;color:#aaa;font-weight:600;
  font-size:11px;border-bottom:1.5px solid #f0f2f5;letter-spacing:.3px;
}
td{padding:7px 10px;border-bottom:1px solid #f7f8fa;color:#333;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafbff;}
.td-time{color:#aaa;font-size:11px;font-weight:500;}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}
.badge-ok{background:#e8f5e9;color:#388e3c;}
.badge-alert{background:#fce4ec;color:#c62828;}
.empty-state{text-align:center;padding:24px;color:#ccc;font-size:13px;}

/* ── ALERT ── */
.alert-banner{
  display:none;background:#fff3e0;border:1px solid #ffcc02;
  border-radius:12px;padding:10px 14px;margin-bottom:12px;
  font-size:12px;color:#e65100;font-weight:500;
  align-items:center;gap:8px;
}
.alert-banner.show{display:flex;}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a class="back-btn" href="#">&#8592;</a>
    <h1>Monitoring CAS</h1>
    <div class="status-dot" id="statusDot"></div>
  </div>
  <div class="header-right">
    <span class="conn-label" id="connLabel">Offline</span>
    <div class="icon-btn">🔔</div>
    <div class="icon-btn" onclick="document.getElementById('mqttConfig').open=!document.getElementById('mqttConfig').open">⚙️</div>
  </div>
</header>

<main>

  <!-- MQTT CONFIG -->
  <details class="config-card" id="mqttConfig" open>
    <summary>Konfigurasi MQTT Broker</summary>
    <div class="config-grid">
      <div class="cfg-group">
        <label>BROKER HOST</label>
        <input id="cfgHost" value="broker.emqx.io"/>
      </div>
      <div class="cfg-group">
        <label>WSS PORT</label>
        <input id="cfgPort" value="8084"/>
      </div>
      <div class="cfg-group">
        <label>PATH</label>
        <input id="cfgPath" value="/mqtt"/>
      </div>
      <div class="cfg-group">
        <label>USERNAME</label>
        <input id="cfgUser" value=""/>
      </div>
      <div class="cfg-group">
        <label>PASSWORD</label>
        <input id="cfgPass" value="" type="password"/>
      </div>
    </div>
    <div class="cfg-actions">
      <button class="btn btn-primary" onclick="connectMQTT()">Hubungkan</button>
      <button class="btn btn-danger" id="btnDisc" onclick="disconnectMQTT()" style="display:none">Putuskan</button>
    </div>
  </details>

  <!-- ALERT -->
  <div class="alert-banner" id="alertBanner">
    ⚠️ <span id="alertMsg"></span>
  </div>

  <!-- GAUGES -->
  <div class="gauges">

    <!-- SUHU -->
    <div class="gauge-card">
      <div class="gauge-title">Suhu</div>
      <div class="gauge-wrap">
        <svg viewBox="0 0 160 90">
          <path class="arc-bg" d="M18,82 A62,62 0 0,1 142,82"/>
          <path class="arc-fg" id="arcSuhu" d="M18,82 A62,62 0 0,1 142,82"
            style="stroke:#2979ff;stroke-dasharray:194.8;stroke-dashoffset:194.8"/>
        </svg>
        <div class="gauge-center">
          <div class="gauge-val" id="valSuhu">--</div>
          <div class="gauge-unit">°C</div>
        </div>
      </div>
      <div class="gauge-range"><span>0</span><span>50</span></div>
      <div class="gauge-status-pill" id="stSuhu">Normal</div>
    </div>

    <!-- KELEMBAPAN -->
    <div class="gauge-card">
      <div class="gauge-title">Kelembapan</div>
      <div class="gauge-wrap">
        <svg viewBox="0 0 160 90">
          <path class="arc-bg" d="M18,82 A62,62 0 0,1 142,82"/>
          <path class="arc-fg" id="arcHum" d="M18,82 A62,62 0 0,1 142,82"
            style="stroke:#2979ff;stroke-dasharray:194.8;stroke-dashoffset:194.8"/>
        </svg>
        <div class="gauge-center">
          <div class="gauge-val" id="valHum">--</div>
          <div class="gauge-unit">%</div>
        </div>
      </div>
      <div class="gauge-range"><span>0</span><span>100</span></div>
      <div class="gauge-status-pill" id="stHum">Normal</div>
    </div>

    <!-- CO2 -->
    <div class="gauge-card">
      <div class="gauge-title">CO₂</div>
      <div class="gauge-wrap">
        <svg viewBox="0 0 160 90">
          <path class="arc-bg" d="M18,82 A62,62 0 0,1 142,82"/>
          <path class="arc-fg" id="arcCO2" d="M18,82 A62,62 0 0,1 142,82"
            style="stroke:#2979ff;stroke-dasharray:194.8;stroke-dashoffset:194.8"/>
        </svg>
        <div class="gauge-center">
          <div class="gauge-val" id="valCO2" style="font-size:26px">--</div>
          <div class="gauge-unit">% vol</div>
        </div>
      </div>
      <div class="gauge-range"><span>0%</span><span>10%</span></div>
      <div class="gauge-status-pill" id="stCO2">Normal</div>
    </div>

    <!-- O2 -->
    <div class="gauge-card">
      <div class="gauge-title">O₂</div>
      <div class="gauge-wrap">
        <svg viewBox="0 0 160 90">
          <path class="arc-bg" d="M18,82 A62,62 0 0,1 142,82"/>
          <path class="arc-fg" id="arcO2" d="M18,82 A62,62 0 0,1 142,82"
            style="stroke:#2979ff;stroke-dasharray:194.8;stroke-dashoffset:194.8"/>
        </svg>
        <div class="gauge-center">
          <div class="gauge-val" id="valO2">--</div>
          <div class="gauge-unit">%</div>
        </div>
      </div>
      <div class="gauge-range"><span>0</span><span>25</span></div>
      <div class="gauge-status-pill" id="stO2">Normal</div>
    </div>

  </div>

  <!-- CHARTS -->
  <div class="charts">
    <div class="chart-card">
      <div class="chart-card-header">
        <h3>Suhu</h3>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot" style="background:#ef5350"></div>°C</div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="chartSuhu"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-header">
        <h3>Kelembapan</h3>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot" style="background:#4caf50"></div>%</div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="chartHum"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-header">
        <h3>CO₂</h3>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot" style="background:#9c27b0"></div>ppm</div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="chartCO2"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-header">
        <h3>O₂</h3>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot" style="background:#2979ff"></div>%</div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="chartO2"></canvas></div>
    </div>
  </div>

  <!-- LOG -->
  <div class="log-card">
    <h3>Riwayat Data</h3>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>WAKTU</th>
            <th>SUHU (°C)</th>
            <th>KELEMBAPAN (%)</th>
            <th>CO₂ (% vol)</th>
            <th>O₂ (%)</th>
            <th>STATUS</th>
          </tr>
        </thead>
        <tbody id="logBody">
          <tr><td colspan="6" class="empty-state">Menunggu data dari perangkat...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<script>
// ── CONFIG ──
const ARC = 194.8;
const MAX = 30;
let mqttClient = null;
let buf = {suhu:null,hum:null,co2:null,o2:null};
let logRows = [];

// ── CHART FACTORY ──
Chart.defaults.color='#bbb';
Chart.defaults.borderColor='#f0f2f5';
function makeChart(id,color,label,yMin,yMax,unit=''){
  return new Chart(document.getElementById(id).getContext('2d'),{
    type:'line',
    data:{labels:[],datasets:[{
      label,data:[],
      borderColor:color,
      backgroundColor:color+'18',
      borderWidth:2,tension:.4,pointRadius:0,fill:true
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:400},
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{maxRotation:0,maxTicksLimit:6,font:{size:10}},grid:{display:false}},
        y:{
          min:yMin,max:yMax,
          ticks:{font:{size:10},callback:v=>v+(unit?unit:'')},
          grid:{color:'#f5f5f5'}
        }
      }
    }
  });
}
// Suhu: 0–50 °C
const cSuhu = makeChart('chartSuhu','#ef5350','Suhu °C',     0,  50, '°C');
// Kelembapan: 0–100 %
const cHum  = makeChart('chartHum', '#4caf50','Kelembapan %',0, 100, '%');
// CO2: 0–10 % vol
const cCO2  = makeChart('chartCO2', '#9c27b0','CO₂ % vol',  0,  10, '%');
// O2: 0–25 %
const cO2   = makeChart('chartO2',  '#2979ff','O₂ %',       0,  25, '%');

// ── GAUGE ──
function setArc(id,val,min,max){
  const r = Math.min(Math.max((val-min)/(max-min),0),1);
  document.getElementById(id).style.strokeDashoffset = ARC*(1-r);
}

function setPill(id,val,okLow,okHigh,warnLow,warnHigh){
  const el = document.getElementById(id);
  if(val>=okLow && val<=okHigh){el.textContent='Normal';el.className='gauge-status-pill';}
  else if(val>=warnLow && val<=warnHigh){el.textContent='Peringatan';el.className='gauge-status-pill pill-warn';}
  else{el.textContent='Bahaya';el.className='gauge-status-pill pill-danger';}
}

// ── ALERT ──
function checkAlert(s,h,c,o){
  const msgs=[];
  if(s>40) msgs.push('Suhu terlalu tinggi ('+s+'°C)');
  if(h<20)  msgs.push('Kelembapan rendah ('+h+'%)');
  if(c>8) msgs.push('CO₂ berbahaya ('+c+'% vol)');
  if(o<18)  msgs.push('O₂ rendah ('+o+'%)');
  const b=document.getElementById('alertBanner');
  if(msgs.length){
    document.getElementById('alertMsg').textContent=msgs.join(' • ');
    b.classList.add('show');
  } else b.classList.remove('show');
}

// ── LOG TABLE ──
function addRow(s,h,c,o){
  const t=new Date().toLocaleTimeString('id-ID',{hour12:false});
  const ok=(s<=40&&h>=20&&c<=2000&&o>=18);
  logRows.unshift({t,s,h,c,o,ok});
  if(logRows.length>50) logRows.pop();
  document.getElementById('logBody').innerHTML=logRows.map(r=>`
    <tr>
      <td class="td-time">${r.t}</td>
      <td>${r.s}</td><td>${r.h}</td><td>${r.c}</td><td>${r.o}</td>
      <td><span class="badge ${r.ok?'badge-ok':'badge-alert'}">${r.ok?'Normal':'Alert'}</span></td>
    </tr>`).join('');
}

// ── PUSH DATA ──
function pushChart(chart,val){
  const t=new Date().toLocaleTimeString('id-ID',{hour12:false});
  chart.data.labels.push(t);
  chart.data.datasets[0].data.push(val);
  if(chart.data.labels.length>MAX){
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }
  chart.update();
}

// ── ON MESSAGE ──
function onMsg(topic,val){
  const v=parseFloat(val); if(isNaN(v)) return;
  if(topic.includes('Suhu'))       buf.suhu=v;
  else if(topic.includes('Kelembapan')) buf.hum=v;
  else if(topic.includes('CO2'))   buf.co2=v;
  else if(topic.includes('O2'))    buf.o2=v;

  const {suhu:s,hum:h,co2:c,o2:o}=buf;
  if(s===null||h===null||c===null||o===null) return;

  // gauges
  const cPct = (c/10000).toFixed(2); // konversi ppm → % vol (100000ppm = 10%)
  document.getElementById('valSuhu').textContent=s.toFixed(1);
  document.getElementById('valHum').textContent=h.toFixed(1);
  document.getElementById('valCO2').textContent=cPct;
  document.getElementById('valO2').textContent=o.toFixed(1);
  setArc('arcSuhu',s,0,50);
  setArc('arcHum',h,0,100);
  setArc('arcCO2',parseFloat(cPct),0,10);
  setArc('arcO2',o,0,25);
  setPill('stSuhu',s,10,35,5,40);
  setPill('stHum',h,40,80,20,90);
  setPill('stCO2',parseFloat(cPct),0,5,5,8);
  setPill('stO2',o,19.5,23,18,19.5);
  checkAlert(s,h,parseFloat(cPct),o);

  // charts
  pushChart(cSuhu,s); pushChart(cHum,h);
  pushChart(cCO2,parseFloat(cPct));  pushChart(cO2,o);

  // log
  addRow(s.toFixed(1),h.toFixed(1),cPct+'%',o.toFixed(1));
  buf={suhu:null,hum:null,co2:null,o2:null};
}

// ── STATUS UI ──
function setStatus(state){
  const dot=document.getElementById('statusDot');
  const lbl=document.getElementById('connLabel');
  dot.className='status-dot '+state;
  lbl.textContent=state==='online'?'Online':state==='connecting'?'Menghubungkan...':'Offline';
}

// ── MQTT (menggunakan mqtt.js) ──
function connectMQTT(){
  const host = document.getElementById('cfgHost').value.trim();
  const port = parseInt(document.getElementById('cfgPort').value)||8084;
  const path = document.getElementById('cfgPath').value.trim()||'/mqtt';
  const user = document.getElementById('cfgUser').value.trim();
  const pass = document.getElementById('cfgPass').value;

  // Putuskan koneksi lama jika ada
  if(mqttClient){
    try{ mqttClient.end(true); }catch(e){}
    mqttClient = null;
  }

  const cid = 'cas_'+Math.random().toString(16).substr(2,8);
  const url  = 'wss://'+host+':'+port+path;

  console.log('[MQTT] Connecting to:', url);
  setStatus('connecting');

  const opts = {
    clientId: cid,
    clean: true,
    reconnectPeriod: 5000,
    connectTimeout: 10000,
  };
  if(user) opts.username = user;
  if(pass) opts.password = pass;

  mqttClient = mqtt.connect(url, opts);

  mqttClient.on('connect', ()=>{
    console.log('[MQTT] Connected!');
    setStatus('online');
    document.getElementById('mqttConfig').open = false;
    document.getElementById('btnDisc').style.display = '';
    ['Suhu CAS','Kelembapan CAS','CO2 CAS','O2 CAS'].forEach(t=>{
      mqttClient.subscribe(t, {qos:0});
      console.log('[MQTT] Subscribed:', t);
    });
  });

  mqttClient.on('message', (topic, payload)=>{
    onMsg(topic, payload.toString());
  });

  mqttClient.on('error', (err)=>{
    console.log('[MQTT] Error:', err.message);
    setStatus('offline');
  });

  mqttClient.on('close', ()=>{
    console.log('[MQTT] Disconnected');
    setStatus('offline');
    document.getElementById('btnDisc').style.display='none';
  });

  mqttClient.on('reconnect', ()=>{
    console.log('[MQTT] Reconnecting...');
    setStatus('connecting');
  });
}

function disconnectMQTT(){
  if(mqttClient){
    mqttClient.end(true);
    mqttClient = null;
  }
  setStatus('offline');
  document.getElementById('btnDisc').style.display='none';
}

// ── AUTO CONNECT saat halaman dibuka ──
window.addEventListener('load', ()=>{
  setTimeout(connectMQTT, 1000);
});
</script>
</body>
</html>
